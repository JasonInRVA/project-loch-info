\t<a uid=4151 href='\/news-info'>News &amp; Info<\/a>\n\t\t»\n\t\t<a uid=4152 href='\/news-info\/shortcuts'>\n\t\tTrack a Permit\n\t\tPermitting Enhancement and Evaluation Platform (PEEP)\n\t\tDEQ’s\n\t\t<a uid=4153 href='portal.deq.virginia.gov\/peep-search'>Permitting Enhancement and Evaluation Platform (PEEP)<\/a>\n\t\tfirst launched as a pilot program for this effort late…will be made available in\n\t\t<a uid=4154 href='permits.virginia.gov'>Virginia Permit Transparency<\/a>\n\t\t<a uid=4155 href='permits.virginia.gov'>(VPT)<\/a>\n\t\twhen this platform is fully developed.\n\t\t<img uid=4156 src='image.jpg' alt='PEEP screenshot 071723'>\n\t\tPEEP brings transparency to DEQ’s permitting processes by providing current information about the critical steps…\n\t\t<a uid=4157 href='portal.deq.virginia.gov\/peep-search'>\n\t\t\t<img uid=4158 src='image.png' alt='try it out button'>\n\t\t<\/a>\n\t\t<a uid=4159 href='\/water\/stormwater\/stormwater-construction'>Click here<\/a>\n\t\tfor information about Stormwater Construction General Permit Automation.\n\t\t<div role='region' aria-label='Accordion'>\n\t\t\t<div uid=4160 role='button' aria-expanded='true'>DEQ Permit Processing Goals and Progress<\/div>\n\t\t\tBelow is a table displaying DEQ&#39;s operational key results in reducing permitting timeframes*.\n\t\t\t<iframe uid=4161 title='Table displaying DEQ Enforcement Resolution Goals and Progress' src='portaluat.deq.virginia.gov'>\n\t\t\tPermit Processing Time\n\t\t\tClick the link below (DEQ Performance Report) to access the DEQ Performance Report, which details…\n\t\t\t<ul>\n\t\t\t\t<li>Performance Summary: Performance by DEQ and other task assignees in meeting target days to complete…<\/li>\n\t\t\t\t<li>DEQ Performance Heat Map: Normative scholastic grading scheme and associated color-coded heat mapping applied…<\/li>\n\t\t\t\t<li>DEQ Target Trends: Trends analysis of performance in meeting target days to complete request types…<\/li>\n\t\t\t<\/ul>\n\t\t\t<a uid=4162 href='portal.deq.virginia.gov\/v2\/reports\/tableau\/deq-performance-report'>DEQ Performance Report<\/a>\n\t\t\t<a uid=4163 href='portal.deq.virginia.gov\/v2\/reports\/tableau\/peep-public-data-access'>Download PEEP Data<\/a>\n\t\t\t<a uid=4164 href='public.tableau.com\/app\/profile\/virginiadeq\/viz\/PEEPPublicDataAccess'>\n\t\t\tEnforcement Resolution\n\t\t\tBelow is a table displaying DEQ&#39;s improvements in resolving Enforcement…In addition, DEQ provides a\n\t\t\t<a uid=4165 href='portal.deq.virginia.gov\/reports\/tableau\/pending-enforcement-case-duration'>Pending Cases Report<\/a>\n\t\t\tshowing current Enforcement Actions awaiting resolution, and a\n\t\t\t<a uid=4166 href='portal.deq.virginia.gov\/enforcement-resolved-cases'>Resolved Cases Report<\/a>\n\t\t\tdetailing actions that have reached closure.\n\t\t\t<iframe uid=4167 title='Table displaying DEQ permit processing Goals and Progress' src='portaluat.deq.virginia.gov'>\n\t\t\t* Reported values for permit processing and enforcement case resolution is averaged on a rolling 365…\n\t\t\t<div uid=4168 role='button' aria-expanded='false'>How to Use PEEP<\/div>\n\t\t\t<a uid=4169 href='portal.deq.virginia.gov\/peep-search'>\n\t\t\t<a uid=4170 href='\/home\/showpublisheddocument\/19748'>\n\t\t\t<a uid=4171 href='youtu.be'>\n\t\t\t<iframe uid=4172 title='YouTube video about DEQ\\'s Permitting Enhancement and Evaluation Platform (PEEP)' src='www.youtube.com'>\n\t\t\t<div uid=4173 role='button' aria-expanded='false'>What PEEP Tracks<\/div>\n\t\t\t<a uid=4174 href='\/home\/showpublisheddocument\/19747'>\n\t\t\t<a uid=4175 href='\/home\/showpublisheddocument\/19746'>\n\t\t\t<div uid=4176 role='button' aria-expanded='false'>Key PEEP Elements<\/div>\n\t\t\t<ul role='list'>\n\t\t\t\t<li role='listitem'>\n\t\t\t<\/ul>\n\t\t\t<div uid=4177 role='button' aria-expanded='false'>PEEP Task Assignees\/Agency Acronyms<\/div>\n\t\t\t<div uid=4178 role='button' aria-expanded='false'>Virginia Permit Transparency (VPT)<\/div>\n\
